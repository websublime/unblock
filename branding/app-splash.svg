<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 320" width="480" height="320">
  <!-- Canvas background -->
  <rect width="480" height="320" rx="16" fill="#0D1217"/>

  <!-- Subtle surface panel -->
